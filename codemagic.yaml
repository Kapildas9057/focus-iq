workflows:
  ios-release:
    name: FocusLoop iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Build web assets
        script: |
          npm run build

      - name: Add iOS platform (if missing)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios


      - name: Build unsigned IPA (No Developer Account Needed)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/FocusLoop.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/FocusLoop.xcarchive \
            -exportPath $CM_BUILD_DIR/FocusLoop.ipa \
            -exportOptionsPlist exportOptions.plist

      - name: Create export options (ad-hoc / no signing)
        script: |
          cat > ios/App/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      email:
        recipients:
          - you@email.com   # ← Change this to your email
        notify:
          success: true
          failure: true
